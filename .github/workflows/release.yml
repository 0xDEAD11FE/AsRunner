name: Release

# Запускается при пуше тега вида v1.2.3
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # нужно, чтобы создать GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          # full: с суффиксом (для -p:Version -> InformationalVersion, откуда апдейтер
          #       читает полный semver «1.2.0-beta.1»).
          # version: числовая часть (для имени артефакта и Inno — им нужен X.Y.Z).
          $tag = "${{ github.ref_name }}"
          $full = $tag.TrimStart('v')            # v1.2.3-beta.1 -> 1.2.3-beta.1
          $version = ($full -split '-')[0]       # -> 1.2.3
          "full=$full"       >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Tag $tag -> full $full, version $version"

      - name: Publish app (single-file, framework-dependent)
        # -p:Version=full: суффикс уходит в InformationalVersion (AssemblyVersion всё равно
        # хранит только X.Y.Z.0 — этого достаточно, полный semver берётся из Informational).
        run: dotnet publish AsRunner/AsRunner.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:Version=${{ steps.ver.outputs.full }} -o AsRunner/bin/Release/publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc /DMyAppVersion=${{ steps.ver.outputs.version }} AsRunner.Installer\AsRunner.iss

      - name: Name artifact with version
        shell: pwsh
        run: Copy-Item AsRunner.Installer/bin/AsRunnerSetup.exe "AsRunnerSetup-${{ steps.ver.outputs.version }}.exe"

      - name: Create GitHub Release
        # Через gh CLI (нативный, без Node) — надёжнее стороннего action.
        # Черновик; теги с суффиксом (v1.2.3-beta) помечаются как pre-release.
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.ver.outputs.version }}"
          $full = "${{ steps.ver.outputs.full }}"
          $ghArgs = @($tag, "AsRunnerSetup-$version.exe",
                      "--title", "AsRunner $full",
                      "--generate-notes", "--draft")
          if ($tag -like "*-*") { $ghArgs += "--prerelease" }
          gh release create @ghArgs
