name: Release

# Запускается при пуше тега вида v1.2.3
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # нужно, чтобы создать GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          # v1.2.3 -> 1.2.3 ; v1.2.3-beta -> 1.2.3 (MSI-версия должна быть числовой)
          $tag = "${{ github.ref_name }}"
          $version = ($tag.TrimStart('v') -split '-')[0]
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Tag $tag -> MSI version $version"

      - name: Build MSI
        run: dotnet build AsRunner.Installer/AsRunner.Installer.wixproj -c Release -p:ProductVersion=${{ steps.ver.outputs.version }}

      - name: Name artifact with version
        shell: pwsh
        run: Copy-Item AsRunner.Installer/bin/x64/Release/AsRunnerSetup.msi "AsRunnerSetup-${{ steps.ver.outputs.version }}.msi"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AsRunnerSetup-${{ steps.ver.outputs.version }}.msi
          generate_release_notes: true
          # Теги с суффиксом (v1.2.3-beta) помечаются как pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}
          # draft: true   # включи, если хочешь сперва проверять Release перед публикацией
