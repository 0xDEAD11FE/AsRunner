name: Release

# Запускается при пуше тега вида v1.2.3
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # нужно, чтобы создать GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          # v1.2.3 -> 1.2.3 ; v1.2.3-beta -> 1.2.3
          $tag = "${{ github.ref_name }}"
          $version = ($tag.TrimStart('v') -split '-')[0]
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Tag $tag -> version $version"

      - name: Publish app (single-file, framework-dependent)
        run: dotnet publish AsRunner/AsRunner.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o AsRunner/bin/Release/publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc /DMyAppVersion=${{ steps.ver.outputs.version }} AsRunner.Installer\AsRunner.iss

      - name: Name artifact with version
        shell: pwsh
        run: Copy-Item AsRunner.Installer/bin/AsRunnerSetup.exe "AsRunnerSetup-${{ steps.ver.outputs.version }}.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AsRunnerSetup-${{ steps.ver.outputs.version }}.exe
          generate_release_notes: true
          # Теги с суффиксом (v1.2.3-beta) помечаются как pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Релиз создаётся черновиком: заметки пишешь на GitHub и публикуешь вручную.
          draft: true
